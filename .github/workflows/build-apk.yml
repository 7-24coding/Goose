name: Build and Release Android APK

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init

      - name: Build Go Backend (AAR)
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          cd core
          gomobile bind -target=android -androidapi 21 -o ../app/android/app/libs/vpn.aar ./cmd/android

      - name: Install Flutter Dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Build APKs (Split per ABI)
        working-directory: ./app
        run: flutter build apk --split-per-abi

      - name: Upload APKs to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            app/build/app/outputs/flutter-apk/app-x86_64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APKs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Goose-VPN-APKs
          path: |
            app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            app/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 7
